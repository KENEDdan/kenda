services:
  db:
    image: postgres:15-alpine
    container_name: kenda_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kenda_db
      POSTGRES_USER: kenda_user
      POSTGRES_PASSWORD: kenda_strong_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kenda_user -d kenda_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kenda_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: kenda_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - '8000:8000'
    env_file: [.env]
    environment:
      DJANGO_SETTINGS_MODULE: kenda_project.settings.development
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}

  celery:
    build: .
    container_name: kenda_celery
    command: celery -A kenda_project worker --loglevel=info
    volumes: [.:/app]
    env_file: [.env]
    depends_on: [db, redis]

  celery-beat:
    build: .
    container_name: kenda_celery_beat
    command: celery -A kenda_project beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes: [.:/app]
    env_file: [.env]
    depends_on: [db, redis]

volumes:
  postgres_data:
  static_volume:
  media_volume: