{% extends 'base/base.html' %}
{% block title %}Sign Out{% endblock %}

{% block content %}
<div class="kenda-auth-wrapper">
    <div class="kenda-auth-card" style="max-width:400px; text-align:center;">
        <a href="/" class="kenda-auth-logo">kenda</a>
        <div class="mt-4 mb-3">
            <div style="width:64px;height:64px;background:var(--kenda-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                <i class="bi bi-box-arrow-left" style="font-size:1.75rem;color:var(--kenda-violet);"></i>
            </div>
            <h5 class="fw-bold" style="color:var(--kenda-indigo);">Sign out of Kenda?</h5>
            <p class="text-muted small">You will be returned to the homepage.</p>
        </div>
        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-kenda w-100 py-2 fw-bold mb-3">
                <i class="bi bi-box-arrow-left me-2"></i>Yes, Sign Out
            </button>
        </form>
        <a href="javascript:history.back()" class="btn btn-outline-secondary w-100 py-2">
            Cancel
        </a>
    </div>
</div>
{% endblock %}
