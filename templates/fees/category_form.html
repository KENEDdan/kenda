{% extends 'dashboard/base_dashboard.html' %}

{% block sidebar_nav %}
<a href="{% url 'dashboard:admin' %}" class="kenda-nav-link">
    <i class="bi bi-grid-fill"></i> Overview
</a>
<div class="kenda-nav-section">Finance</div>
<a href="{% url 'fees:dashboard' %}" class="kenda-nav-link">
    <i class="bi bi-cash-stack"></i> Fee Dashboard
</a>
<a href="{% url 'fees:categories' %}" class="kenda-nav-link active">
    <i class="bi bi-tags"></i> Fee Categories
</a>
{% endblock %}

{% block dashboard_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold mb-0" style="color:var(--kenda-indigo);">
        {{ page_title }}
    </h5>
    <a href="{% url 'fees:categories' %}"
       class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i> Back
    </a>
</div>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="kenda-card">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold small">
                            Category Name <span class="text-danger">*</span>
                        </label>
                        {{ form.name }}
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold small">
                            Description
                        </label>
                        {{ form.description }}
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            {{ form.is_active }}
                            <label class="form-check-label fw-semibold small">
                                Active
                            </label>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-kenda px-5 fw-bold">
                        <i class="bi bi-check-circle me-2"></i>
                        {% if is_edit %}Save{% else %}Add Category{% endif %}
                    </button>
                    <a href="{% url 'fees:categories' %}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
