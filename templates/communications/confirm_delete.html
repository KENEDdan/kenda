{% extends 'dashboard/base_dashboard.html' %}
{% block sidebar_nav %}
<a href="{% url 'communications:list' %}" class="kenda-nav-link active">
    <i class="bi bi-megaphone-fill"></i> Announcements
</a>
{% endblock %}
{% block dashboard_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="kenda-card text-center p-5">
            <div style="width:72px;height:72px;background:#FEE2E2;
                        border-radius:50%;display:flex;align-items:center;
                        justify-content:center;margin:0 auto 1.5rem;">
                <i class="bi bi-trash3-fill"
                   style="font-size:1.75rem;color:#EF4444;"></i>
            </div>
            <h5 class="fw-bold mb-2" style="color:var(--kenda-indigo);">
                Delete Announcement?
            </h5>
            <p class="fw-bold fs-6 mb-4">{{ announcement.title }}</p>
            <div class="d-flex gap-3 justify-content-center">
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-5 fw-bold">
                        Yes, Delete
                    </button>
                </form>
                <a href="{% url 'communications:list' %}"
                   class="btn btn-outline-secondary px-5">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
